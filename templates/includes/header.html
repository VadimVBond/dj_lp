{% load i18n %}

<header class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 sticky top-0 z-50 transition-colors">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <div class="flex justify-between h-16 items-center">

            <!-- Logo -->
            <div class="flex-shrink-0 flex items-center">
                <a href="{{ request.META.SCRIPT_NAME|default:"/" }}{{ LANGUAGE_CODE }}/" class="text-2xl font-bold text-indigo-600 dark:text-indigo-400">
                    LP.Project
                </a>
            </div>

            <!-- Navigation -->
            <nav class="hidden md:flex space-x-8">
                <a href="#features" class="text-gray-600 dark:text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
                    {% trans "Features" %}
                </a>
                <a href="#cta" class="text-gray-600 dark:text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
                    {% trans "Subscribe" %}
                </a>
            </nav>

            <!-- Language switcher & Theme toggle -->
            <div class="flex items-center space-x-4">
                
                <div class="flex items-center space-x-2 bg-gray-100 dark:bg-slate-800 rounded-lg p-1">
                    {% get_available_languages as languages %}
                    {% for lang_code, lang_name in languages %}
                        <a href="{{ request.META.SCRIPT_NAME|default:"/" }}{{ lang_code }}/"
                           class="px-3 py-1 text-sm rounded-md transition
                                  {% if LANGUAGE_CODE == lang_code %}
                                  bg-white dark:bg-slate-700 shadow text-indigo-600 dark:text-indigo-400
                                  {% else %}
                                  text-gray-600 dark:text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400
                                  {% endif %}">
                            {{ lang_code|upper }}
                        </a>
                    {% endfor %}
                </div>

                <button id="theme-toggle" 
                        class="p-2 rounded-lg bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors"
                        aria-label="Toggle Theme">
                    <!-- Sun icon -->
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path>
                    </svg>
                    <!-- Moon icon -->
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                    </svg>
                </button>

            </div>

        </div>
    </div>
</header>
